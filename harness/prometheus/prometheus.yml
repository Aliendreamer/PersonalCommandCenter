global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # App metrics fanned out by the OTel collector.
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
  # Per-container metrics.
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
  # Host metrics.
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
  # GPU metrics (nvidia-smi exporter).
  - job_name: gpu-exporter
    static_configs:
      - targets: ['gpu-exporter:9835']
  # Prometheus itself.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
