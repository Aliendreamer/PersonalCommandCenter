# All routing is defined here (file provider) rather than via docker labels — Traefik's docker
# provider can't negotiate with this Docker daemon (min API 1.40). Services are addressed by
# their compose-internal DNS names (Portainer is now folded into compose, no host gateway).
http:
  routers:
    # NOTE: no api.pcc.localhost route — core-api is internal only (SSR-BFF). The web SSR server
    # is the sole public ingress; it proxies /api/auth/* and fetches data from core-api:8080.
    app:
      rule: 'Host(`app.pcc.localhost`)'
      entryPoints: ['web']
      service: app
    keycloak:
      rule: 'Host(`keycloak.pcc.localhost`)'
      entryPoints: ['web']
      service: keycloak
    ha:
      rule: 'Host(`ha.pcc.localhost`)'
      entryPoints: ['web']
      service: ha
    ntfy:
      rule: 'Host(`ntfy.pcc.localhost`)'
      entryPoints: ['web']
      service: ntfy
    searxng:
      rule: 'Host(`searxng.pcc.localhost`)'
      entryPoints: ['web']
      service: searxng
    portainer:
      rule: 'Host(`portainer.pcc.localhost`)'
      entryPoints: ['web']
      service: portainer
    ollama:
      rule: 'Host(`ollama.pcc.localhost`)'
      entryPoints: ['web']
      service: ollama
    qdrant:
      rule: 'Host(`qdrant.pcc.localhost`)'
      entryPoints: ['web']
      service: qdrant
    wakapi:
      rule: 'Host(`wakapi.pcc.localhost`)'
      entryPoints: ['web']
      service: wakapi
    pgadmin:
      rule: 'Host(`pgadmin.pcc.localhost`)'
      entryPoints: ['web']
      service: pgadmin
    grafana:
      rule: 'Host(`grafana.pcc.localhost`)'
      entryPoints: ['web']
      service: grafana
    prometheus:
      rule: 'Host(`prometheus.pcc.localhost`)'
      entryPoints: ['web']
      service: prometheus
    tempo:
      rule: 'Host(`tempo.pcc.localhost`)'
      entryPoints: ['web']
      service: tempo
  services:
    app:
      loadBalancer:
        servers:
          - url: 'http://web:3000'
    keycloak:
      loadBalancer:
        servers:
          - url: 'http://keycloak:8080'
    ha:
      loadBalancer:
        servers:
          - url: 'http://home-assistant:8123'
    ntfy:
      loadBalancer:
        servers:
          - url: 'http://ntfy:80'
    searxng:
      loadBalancer:
        servers:
          - url: 'http://searxng:8080'
    portainer:
      loadBalancer:
        servers:
          - url: 'http://portainer:9000'
    ollama:
      loadBalancer:
        servers:
          - url: 'http://ollama:11434'
    qdrant:
      loadBalancer:
        servers:
          - url: 'http://qdrant:6333'
    wakapi:
      loadBalancer:
        servers:
          - url: 'http://wakapi:3000'
    pgadmin:
      loadBalancer:
        servers:
          - url: 'http://pgadmin:80'
    grafana:
      loadBalancer:
        servers:
          - url: 'http://grafana:3000'
    prometheus:
      loadBalancer:
        servers:
          - url: 'http://prometheus:9090'
    tempo:
      loadBalancer:
        servers:
          - url: 'http://tempo:3200'
