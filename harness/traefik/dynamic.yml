# All routing is defined here (file provider) rather than via docker labels — Traefik's docker
# provider can't negotiate with this Docker daemon (min API 1.40). Services are addressed by
# their compose-internal DNS names; the standalone Portainer via the host gateway.
http:
  routers:
    # NOTE: no api.pcc.localhost route — core-api is internal only (SSR-BFF). The web SSR server
    # is the sole public ingress; it proxies /api/auth/* and fetches data from core-api:8080.
    app:
      rule: 'Host(`app.pcc.localhost`)'
      entryPoints: ['web']
      service: app
    keycloak:
      rule: 'Host(`keycloak.pcc.localhost`)'
      entryPoints: ['web']
      service: keycloak
    ha:
      rule: 'Host(`ha.pcc.localhost`)'
      entryPoints: ['web']
      service: ha
    ntfy:
      rule: 'Host(`ntfy.pcc.localhost`)'
      entryPoints: ['web']
      service: ntfy
    searxng:
      rule: 'Host(`searxng.pcc.localhost`)'
      entryPoints: ['web']
      service: searxng
    portainer:
      rule: 'Host(`portainer.pcc.localhost`)'
      entryPoints: ['web']
      service: portainer
  services:
    app:
      loadBalancer:
        servers:
          - url: 'http://web:3000'
    keycloak:
      loadBalancer:
        servers:
          - url: 'http://keycloak:8080'
    ha:
      loadBalancer:
        servers:
          - url: 'http://home-assistant:8123'
    ntfy:
      loadBalancer:
        servers:
          - url: 'http://ntfy:80'
    searxng:
      loadBalancer:
        servers:
          - url: 'http://searxng:8080'
    portainer:
      loadBalancer:
        serversTransport: insecure
        servers:
          - url: 'https://host.docker.internal:9443'
  serversTransports:
    insecure:
      insecureSkipVerify: true
