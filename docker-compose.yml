services:
  core-api:
    build:
      context: .
      dockerfile: apps/core-api/Dockerfile
    environment:
      ASPNETCORE_HTTP_PORTS: '8080'
      Plugins__System__Enabled: 'true'
      # Restrict CORS to the web shell's browser origin.
      Web__Origins: 'http://localhost:${WEB_PORT:-3000}'
      # IoT plugin → Home Assistant (token from .env; see .env.example).
      Plugins__Iot__Enabled: 'true'
      Plugins__Iot__HomeAssistant__BaseUrl: 'http://home-assistant:8123'
      Plugins__Iot__HomeAssistant__Token: '${HA_TOKEN:-}'
    depends_on:
      - home-assistant
    ports:
      # Published so the browser (client-side tile) can reach the API at localhost:5080.
      - '${CORE_API_PORT:-5080}:8080'

  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ha-config:/config
    ports:
      # Published for one-time onboarding + long-lived token creation.
      - '${HA_PORT:-8123}:8123'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: '3000'
      # SSR (server-side) reaches the API over the compose network.
      API_URL: 'http://core-api:8080'
    depends_on:
      - core-api
    ports:
      - '${WEB_PORT:-3000}:3000'

volumes:
  ha-config:
