services:
  core-api:
    build:
      context: .
      dockerfile: apps/core-api/Dockerfile
    environment:
      ASPNETCORE_HTTP_PORTS: '8080'
      Plugins__System__Enabled: 'true'
      # Restrict CORS to the web shell's browser origin.
      Web__Origins: 'http://localhost:${WEB_PORT:-3000}'
    ports:
      # Published so the browser (client-side tile) can reach the API at localhost:5080.
      - '${CORE_API_PORT:-5080}:8080'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: '3000'
      # SSR (server-side) reaches the API over the compose network.
      API_URL: 'http://core-api:8080'
    depends_on:
      - core-api
    ports:
      - '${WEB_PORT:-3000}:3000'
