services:
  # Reverse proxy — the ONLY published port. Routes *.pcc.localhost via the FILE provider
  # only (harness/traefik/dynamic.yml) — no docker provider, no docker.sock mount here.
  proxy:
    image: traefik:v3.2
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
    ports:
      - '80:80'
    volumes:
      - ./harness/traefik:/etc/traefik/dynamic:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: pcc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pcc-dev}
      POSTGRES_DB: pcc
    volumes:
      - pcc-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pcc -d pcc']
      interval: 5s
      timeout: 3s
      retries: 15

  # One-shot: ensure Keycloak's dedicated database exists in the shared Postgres (idempotent, runs on
  # both fresh and existing volumes since the Postgres initdb hook only fires on an empty data dir).
  keycloak-db-init:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-pcc-dev}
    command:
      - sh
      - -c
      - >
        psql -h postgres -U pcc -d pcc -tc "SELECT 1 FROM pg_database WHERE datname='keycloak'"
        | grep -q 1 || psql -h postgres -U pcc -d pcc -c "CREATE DATABASE keycloak"
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ['start-dev', '--import-realm']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://keycloak.pcc.localhost
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_PROXY_HEADERS: xforwarded
      # Persist sessions/refresh-tokens/realm-keys in Postgres so a container rebuild doesn't force a
      # re-login (start-dev's default is an ephemeral in-container H2 DB).
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: pcc
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-pcc-dev}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-db-init:
        condition: service_completed_successfully
    volumes:
      - ./harness/keycloak:/opt/keycloak/data/import:ro
    # Routed via the Traefik file provider (harness/traefik/dynamic.yml), not docker labels.

  core-api:
    build:
      context: .
      dockerfile: apps/core-api/Dockerfile
    # Plugin config lives with the plugins: container addresses are each plugin's Options default,
    # non-secret config + Enabled live in appsettings.json, and secrets come from .env (below).
    env_file:
      - .env
    environment:
      ASPNETCORE_HTTP_PORTS: '8080'
      OTEL_EXPORTER_OTLP_ENDPOINT: '${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}'
      Web__Origins: 'http://app.pcc.localhost'
      ConnectionStrings__Postgres: 'Host=postgres;Database=pcc;Username=pcc;Password=${POSTGRES_PASSWORD:-pcc-dev}'
      Auth__Keycloak__Authority: 'http://keycloak.pcc.localhost/realms/Pcc'
      Auth__Keycloak__ClientId: 'pcc_api'
      Auth__Keycloak__ClientSecret: '${KEYCLOAK_CLIENT_SECRET:-pcc-dev-secret}'
      Auth__Keycloak__CallbackUri: 'http://app.pcc.localhost/api/auth/callback'
      Auth__Keycloak__AppBaseUrl: 'http://app.pcc.localhost'
      Auth__Keycloak__PostLogoutRedirectUri: 'http://app.pcc.localhost'
      Auth__Cookies__Domain: '.pcc.localhost'
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      home-assistant:
        condition: service_started
      radicale:
        condition: service_started
      ntfy:
        condition: service_started
      searxng:
        condition: service_started
    volumes:
      - pcc-dataprotection:/keys
    # The Keycloak issuer URL must resolve to the same host from inside this container.
    extra_hosts:
      - 'keycloak.pcc.localhost:host-gateway'
    # No Traefik route — core-api is internal-only (SSR-BFF). It's reachable solely as
    # `core-api:8080` on the compose network, from the web SSR server.

  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:2026.6.3
    volumes:
      - ha-config:/config
      # Reverse-proxy config managed in git (overlays the volume's configuration.yaml).
      - ./harness/home-assistant/configuration.yaml:/config/configuration.yaml:ro
    # Routed via the Traefik file provider (harness/traefik/dynamic.yml), not docker labels.

  radicale:
    image: tomsquest/docker-radicale:3.7.3.0
    # Internal-only CalDAV (no Traefik route) — core-api reaches it as `radicale:5232`.
    volumes:
      - radicale-data:/data
      - ./harness/radicale/config:/config/config:ro
      - ./harness/radicale/users:/config/users:ro

  searxng:
    image: searxng/searxng:2026.6.16-502c820a2
    # Internal metasearch — core-api reaches it as `http://searxng:8080`; UI at searxng.pcc.localhost.
    volumes:
      - ./harness/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: 'http://searxng.pcc.localhost/'

  ntfy:
    image: binwiederhier/ntfy:v2.24.0
    command: serve
    # core-api publishes to it as `http://ntfy:80`; the web UI is at ntfy.pcc.localhost (Traefik).
    # External reachability (phone push from outside) is deferred — internal-only for now.
    environment:
      NTFY_BASE_URL: 'http://ntfy.pcc.localhost'
      NTFY_BEHIND_PROXY: 'true'
      NTFY_CACHE_FILE: '/var/lib/ntfy/cache.db'
      NTFY_ATTACHMENT_CACHE_DIR: '/var/lib/ntfy/attachments'
    volumes:
      - ntfy-data:/var/lib/ntfy

  # --- Base-infra shared stack (leading compose; router-only, no host ports except Redis-TCP) ---
  ollama:
    image: ollama/ollama:0.30.9
    # GPU-accelerated local LLM. Reached via ollama.pcc.localhost (Traefik); no host port.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ollama-data:/root/.ollama

  qdrant:
    image: qdrant/qdrant:v1.18.2
    # Vector DB. REST via qdrant.pcc.localhost (Traefik); gRPC 6334 in-compose only; no host port.
    volumes:
      - qdrant-data:/qdrant/storage

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    # The ONE host-port exception — Redis is TCP and can't ride the HTTP router. localhost:6379.
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  portainer:
    image: portainer/portainer-ce:lts
    # Folded in (standalone retired). UI via portainer.pcc.localhost (Traefik); no host port.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data

  wakapi:
    image: ghcr.io/muety/wakapi:2.17.4
    # WakaTime-compatible coding-activity tracker. Reached via wakapi.pcc.localhost AND on host
    # localhost:3030 — the WakaTime CLI (Go, in WSL) needs a plain localhost host:port because it
    # doesn't resolve *.pcc.localhost. Editor api_url -> http://localhost:3030/api.
    ports:
      - '127.0.0.1:3030:3000'
    environment:
      WAKAPI_PASSWORD_SALT: '${WAKAPI_PASSWORD_SALT:-pcc-dev-salt}'
      WAKAPI_LISTEN_IPV4: '0.0.0.0'
      WAKAPI_BASE_URL: 'http://wakapi.pcc.localhost'
    volumes:
      - wakapi-data:/data

  pgadmin:
    image: dpage/pgadmin4:9.15
    # Postgres admin console. Reached via pgadmin.pcc.localhost (Traefik); no host port.
    # Pre-wired to the PCC Postgres via servers.json (the user supplies the DB password on connect).
    environment:
      PGADMIN_DEFAULT_EMAIL: '${PGADMIN_EMAIL:-admin@pcc.dev}'
      PGADMIN_DEFAULT_PASSWORD: '${PGADMIN_PASSWORD:-admin}'
      PGADMIN_DISABLE_POSTFIX: 'True'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./harness/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - postgres

  # --- Observability: OTLP collector -> Tempo (traces) + Prometheus (metrics) -> Grafana ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.154.0
    command: ['--config=/etc/otelcol-contrib/config.yaml']
    # OTLP in on host 4317 (gRPC) / 4318 (HTTP) so PCC AND other projects can send telemetry here.
    ports:
      - '127.0.0.1:4317:4317'
      - '127.0.0.1:4318:4318'
    volumes:
      - ./harness/otel/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:3.0.0
    command: ['-config.file=/etc/tempo.yaml']
    # Trace store. Reached via tempo.pcc.localhost (Traefik); no host port.
    volumes:
      - ./harness/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo

  prometheus:
    image: prom/prometheus:v3.5.4
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    # Metrics store. Reached via prometheus.pcc.localhost (Traefik); no host port.
    volumes:
      - ./harness/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:13.0.2
    # Dashboards. Reached via grafana.pcc.localhost (Traefik); no host port.
    environment:
      GF_SECURITY_ADMIN_PASSWORD: '${GRAFANA_ADMIN_PASSWORD:-pcc-grafana-dev}'
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./harness/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - tempo

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    # Per-container metrics, scraped by Prometheus (internal).
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  node-exporter:
    image: prom/node-exporter:v1.11.1
    # Host metrics, scraped by Prometheus (internal). Plain ro bind — WSL2 rejects rslave on /.
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro

  gpu-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.4.1
    # nvidia-smi GPU metrics (Prometheus text on :9835). Read by the models plugin + scraped by
    # Prometheus. GPU via the nvidia runtime; WSL2 nvidia-smi is mounted from /usr/lib/wsl.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - /usr/lib/wsl:/usr/lib/wsl:ro

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: '3000'
      # Server-side only: the SSR server (BFF) calls core-api over the internal network.
      # The browser never gets an API URL — it only talks to this SSR server.
      API_URL: 'http://core-api:8080'
    depends_on:
      - core-api
    # Routed via the Traefik file provider (harness/traefik/dynamic.yml), not docker labels.

volumes:
  ha-config:
  pcc-postgres:
  pcc-dataprotection:
  radicale-data:
  ntfy-data:
  ollama-data:
  qdrant-data:
  redis-data:
  portainer-data:
  wakapi-data:
  pgadmin-data:
  tempo-data:
  prometheus-data:
  grafana-data:
