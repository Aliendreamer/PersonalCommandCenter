services:
  # Reverse proxy — the ONLY published port. Routes *.pcc.localhost to the services below
  # (docker provider) and the standalone Portainer (file provider, see harness/traefik).
  proxy:
    image: traefik:v3.2
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
    ports:
      - '80:80'
    volumes:
      - ./harness/traefik:/etc/traefik/dynamic:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: pcc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pcc-dev}
      POSTGRES_DB: pcc
    volumes:
      - pcc-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pcc -d pcc']
      interval: 5s
      timeout: 3s
      retries: 15

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ['start-dev', '--import-realm']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://keycloak.pcc.localhost
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./harness/keycloak:/opt/keycloak/data/import:ro
    labels:
      - traefik.enable=true
      - 'traefik.http.routers.keycloak.rule=Host(`keycloak.pcc.localhost`)'
      - traefik.http.services.keycloak.loadbalancer.server.port=8080

  core-api:
    build:
      context: .
      dockerfile: apps/core-api/Dockerfile
    environment:
      ASPNETCORE_HTTP_PORTS: '8080'
      Plugins__System__Enabled: 'true'
      Plugins__Iot__Enabled: 'true'
      Plugins__Iot__HomeAssistant__BaseUrl: 'http://home-assistant:8123'
      Plugins__Iot__HomeAssistant__Token: '${HA_TOKEN:-}'
      Plugins__Calendar__Enabled: 'true'
      Plugins__Calendar__BaseUrl: 'http://radicale:5232'
      Plugins__Calendar__Collection: '/pcc/calendar/'
      Plugins__Calendar__Username: '${CALDAV_USER:-pcc}'
      Plugins__Calendar__Password: '${CALDAV_PASSWORD:-pcc-dev-caldav}'
      Plugins__Calendar__WindowDays: '7'
      Plugins__Tasks__Enabled: 'true'
      Plugins__Tasks__BaseUrl: 'http://radicale:5232'
      Plugins__Tasks__Collection: '/pcc/tasks/'
      Plugins__Tasks__Username: '${CALDAV_USER:-pcc}'
      Plugins__Tasks__Password: '${CALDAV_PASSWORD:-pcc-dev-caldav}'
      Plugins__Notifications__Enabled: 'true'
      Notifications__Ntfy__BaseUrl: 'http://ntfy:80'
      Notifications__Ntfy__Topic: 'pcc'
      Web__Origins: 'http://app.pcc.localhost'
      ConnectionStrings__Postgres: 'Host=postgres;Database=pcc;Username=pcc;Password=${POSTGRES_PASSWORD:-pcc-dev}'
      Auth__Keycloak__Authority: 'http://keycloak.pcc.localhost/realms/Pcc'
      Auth__Keycloak__ClientId: 'pcc_api'
      Auth__Keycloak__ClientSecret: '${KEYCLOAK_CLIENT_SECRET:-pcc-dev-secret}'
      Auth__Keycloak__CallbackUri: 'http://app.pcc.localhost/api/auth/callback'
      Auth__Keycloak__AppBaseUrl: 'http://app.pcc.localhost'
      Auth__Keycloak__PostLogoutRedirectUri: 'http://app.pcc.localhost'
      Auth__Cookies__Domain: '.pcc.localhost'
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      home-assistant:
        condition: service_started
      radicale:
        condition: service_started
      ntfy:
        condition: service_started
    volumes:
      - pcc-dataprotection:/keys
    # The Keycloak issuer URL must resolve to the same host from inside this container.
    extra_hosts:
      - 'keycloak.pcc.localhost:host-gateway'
    # No Traefik route — core-api is internal-only (SSR-BFF). It's reachable solely as
    # `core-api:8080` on the compose network, from the web SSR server.

  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ha-config:/config
      # Reverse-proxy config managed in git (overlays the volume's configuration.yaml).
      - ./harness/home-assistant/configuration.yaml:/config/configuration.yaml:ro
    labels:
      - traefik.enable=true
      - 'traefik.http.routers.ha.rule=Host(`ha.pcc.localhost`)'
      - traefik.http.services.ha.loadbalancer.server.port=8123

  radicale:
    image: tomsquest/docker-radicale:latest
    # Internal-only CalDAV (no Traefik route) — core-api reaches it as `radicale:5232`.
    volumes:
      - radicale-data:/data
      - ./harness/radicale/config:/config/config:ro
      - ./harness/radicale/users:/config/users:ro

  ntfy:
    image: binwiederhier/ntfy:latest
    command: serve
    # core-api publishes to it as `http://ntfy:80`; the web UI is at ntfy.pcc.localhost (Traefik).
    # External reachability (phone push from outside) is deferred — internal-only for now.
    environment:
      NTFY_BASE_URL: 'http://ntfy.pcc.localhost'
      NTFY_BEHIND_PROXY: 'true'
      NTFY_CACHE_FILE: '/var/lib/ntfy/cache.db'
      NTFY_ATTACHMENT_CACHE_DIR: '/var/lib/ntfy/attachments'
    volumes:
      - ntfy-data:/var/lib/ntfy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: '3000'
      # Server-side only: the SSR server (BFF) calls core-api over the internal network.
      # The browser never gets an API URL — it only talks to this SSR server.
      API_URL: 'http://core-api:8080'
    depends_on:
      - core-api
    labels:
      - traefik.enable=true
      - 'traefik.http.routers.app.rule=Host(`app.pcc.localhost`)'
      - traefik.http.services.app.loadbalancer.server.port=3000

volumes:
  ha-config:
  pcc-postgres:
  pcc-dataprotection:
  radicale-data:
  ntfy-data:
